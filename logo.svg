<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#16C98D"/>
      <stop offset="100%" stop-color="#0A8A5F"/>
    </linearGradient>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#F0FDF8" stop-opacity="0.92"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="200" height="200" rx="44" fill="url(#bg)"/>
  <!-- Subtle inner shadow effect -->
  <rect width="200" height="200" rx="44" fill="white" fill-opacity="0.06"/>
  <!-- Book/ledger shape -->
  <rect x="42" y="34" width="116" height="140" rx="10" fill="url(#page)" opacity="0.95"/>
  <!-- Book spine -->
  <rect x="42" y="34" width="14" height="140" rx="10" fill="#0A8A5F" opacity="0.25"/>
  <!-- Lines representing ledger entries -->
  <rect x="68" y="60" width="68" height="5" rx="2.5" fill="#16C98D" opacity="0.8"/>
  <rect x="68" y="74" width="50" height="4" rx="2" fill="#94A3B8" opacity="0.5"/>
  <rect x="68" y="86" width="60" height="4" rx="2" fill="#94A3B8" opacity="0.5"/>
  <!-- Divider line -->
  <rect x="58" y="100" width="86" height="1.5" rx="1" fill="#E2E8F0" opacity="0.9"/>
  <!-- Income row with + indicator -->
  <circle cx="66" cy="116" r="7" fill="#16C98D" opacity="0.15"/>
  <rect x="63" y="115" width="6" height="2" rx="1" fill="#16C98D"/>
  <rect x="65" y="113" width="2" height="6" rx="1" fill="#16C98D"/>
  <rect x="78" y="113" width="42" height="4" rx="2" fill="#94A3B8" opacity="0.4"/>
  <rect x="126" y="113" width="18" height="4" rx="2" fill="#16C98D" opacity="0.7"/>
  <!-- Expense row with - indicator -->
  <circle cx="66" cy="133" r="7" fill="#E5534B" opacity="0.12"/>
  <rect x="63" y="132" width="6" height="2" rx="1" fill="#E5534B"/>
  <rect x="78" y="130" width="36" height="4" rx="2" fill="#94A3B8" opacity="0.4"/>
  <rect x="126" y="130" width="18" height="4" rx="2" fill="#E5534B" opacity="0.7"/>
  <!-- Bottom total bar -->
  <rect x="58" y="148" width="86" height="16" rx="6" fill="#16C98D" opacity="0.12"/>
  <rect x="66" y="153" width="24" height="5" rx="2.5" fill="#0A8A5F" opacity="0.7"/>
  <rect x="118" y="153" width="20" height="5" rx="2.5" fill="#0A8A5F" opacity="0.9"/>
  <!-- Small Nepal flag dots / accent -->
  <circle cx="155" cy="45" r="6" fill="#FFFFFF" opacity="0.3"/>
  <circle cx="155" cy="45" r="3" fill="#FFFFFF" opacity="0.5"/>
</svg>
