<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="240" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00C896"/>
      <stop offset="100%" stop-color="#007A5E"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="240" height="240" rx="52" fill="url(#g1)"/>
  <rect width="240" height="240" rx="52" fill="url(#g2)"/>
  <!-- Bold H letterform -->
  <rect x="38" y="52" width="22" height="136" rx="6" fill="white"/>
  <rect x="38" y="104" width="70" height="22" rx="5" fill="white" opacity="0.9"/>
  <rect x="86" y="52" width="22" height="136" rx="6" fill="white"/>
  <!-- Accent slash - represents money/ledger line -->
  <rect x="128" y="52" width="14" height="136" rx="4" fill="white" opacity="0.35" transform="rotate(-12 135 120)"/>
  <!-- K letterform -->
  <rect x="148" y="52" width="20" height="136" rx="6" fill="white"/>
  <path d="M168 115 L202 56" stroke="white" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M168 126 L202 186" stroke="white" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Small rupee accent dot -->
  <circle cx="198" cy="194" r="10" fill="white" opacity="0.3"/>
  <circle cx="198" cy="194" r="5" fill="white" opacity="0.5"/>
</svg>
